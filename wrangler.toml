name = "mauritius-resort-finder"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# Big Dodo — uses Cloudflare Workers AI (free tier, no API key needed)
# Enable via Cloudflare dashboard: Pages → Settings → Functions → AI Bindings
# Add binding: Variable name = AI

[ai]
binding = "AI"

# Contact form — plain (non-secret) variables
# RESEND_API_KEY is a Secret — add it in the Cloudflare dashboard only
[vars]
EMAIL_FROM    = "noreply@mauritiusresortfinder.com"
CONTACT_EMAIL = "strengthygivenncube@gmail.com"
