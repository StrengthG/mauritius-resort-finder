name = "mauritius-resort-finder"
type = "javascript"
main = "index.js"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# Cloudflare Pages configuration
[env.production]
name = "mauritius-resort-finder"

[build]
command = "node site_builder.js --out ./dist --base https://mauritiusresortfinder.com --verbose"
cwd = "./"
watch_paths = []

[env.production.triggers.crons]
# Rebuild hourly for content updates
crons = ["0 * * * *"]

